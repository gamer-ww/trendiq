<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendIQ — Creator Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #13131a; --bg3: #1c1c26;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f5; --text2: #9090a8; --text3: #5a5a72;
    --purple: #7c6ff7; --purple-bg: rgba(124,111,247,0.12);
    --green: #4ade80; --green-bg: rgba(74,222,128,0.1);
    --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.1);
    --red: #f87171; --red-bg: rgba(248,113,113,0.1);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.1);
    --teal: #2dd4bf; --teal-bg: rgba(45,212,191,0.1);
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,'Segoe UI',sans-serif; min-height: 100vh; }

  .header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--purple); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-live { background: var(--green-bg); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .sync-info { font-size: 11px; color: var(--text3); }
  .sync-time { color: var(--text2); font-weight: 500; }

  .notif { margin: 16px 20px 0; padding: 12px 16px; background: var(--green-bg); border: 1px solid rgba(74,222,128,0.2); border-radius: 12px; display: flex; align-items: flex-start; gap: 10px; }
  .notif-title { font-size: 13px; font-weight: 600; color: var(--green); margin-bottom: 2px; }
  .notif-sub { font-size: 12px; color: var(--text2); }

  .filters { padding: 16px 20px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .time-btn { padding: 6px 14px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; }
  .time-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

  .plat-filters { padding: 10px 20px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .plat-btn { padding: 6px 16px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; }
  .plat-btn.yt-active { background: var(--red-bg); color: var(--red); border-color: rgba(248,113,113,0.3); }
  .plat-btn.ig-active { background: var(--purple-bg); color: var(--purple); border-color: rgba(124,111,247,0.3); }
  .plat-btn.both-active { background: var(--green-bg); color: var(--green); border-color: rgba(74,222,128,0.3); }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 16px 20px 0; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); }

  .cat-filters { padding: 14px 20px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn { padding: 4px 12px; font-size: 11px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; }
  .cat-btn.active { border-color: var(--border2); color: var(--text); background: var(--bg3); }

  .section-head { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; padding: 20px 20px 8px; }

  .topic-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin: 0 20px 8px; cursor: pointer; transition: border-color 0.15s; }
  .topic-card:hover { border-color: var(--border2); }
  .topic-card.expanded { border-color: rgba(124,111,247,0.4); }
  .topic-top { display: flex; align-items: flex-start; gap: 12px; }
  .rank { font-size: 18px; font-weight: 700; color: var(--text3); min-width: 30px; }
  .rank.top3 { color: var(--purple); }
  .topic-body { flex: 1; min-width: 0; }
  .topic-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .topic-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip { padding: 2px 9px; border-radius: 5px; font-size: 11px; font-weight: 500; }
  .chip-tech { background: var(--blue-bg); color: var(--blue); }
  .chip-finance { background: var(--green-bg); color: var(--green); }
  .chip-politics { background: var(--amber-bg); color: var(--amber); }
  .chip-incidents { background: var(--red-bg); color: var(--red); }
  .chip-business { background: var(--teal-bg); color: var(--teal); }
  .chip-startups { background: var(--purple-bg); color: var(--purple); }
  .chip-verified { background: var(--green-bg); color: var(--green); }
  .chip-partial { background: var(--amber-bg); color: var(--amber); }
  .chip-misleading { background: var(--red-bg); color: var(--red); }
  .chip-cross { background: var(--green-bg); color: var(--green); }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .bar-label { font-size: 10px; color: var(--text3); min-width: 58px; }
  .bar-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-score { font-size: 11px; color: var(--text2); min-width: 24px; }
  .bar-meta { font-size: 10px; color: var(--text3); }
  .topic-since { font-size: 10px; color: var(--text3); margin-top: 4px; }
  .expand-arrow { font-size: 12px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
  .expand-arrow.open { transform: rotate(180deg); }

  /* Videos Section */
  .videos-panel { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .videos-panel.open { display: block; }
  .videos-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .video-card { display: flex; gap: 10px; align-items: flex-start; padding: 8px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px; text-decoration: none; transition: background 0.15s; }
  .video-card:hover { background: rgba(124,111,247,0.1); }
  .video-thumb { width: 80px; height: 45px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: var(--bg2); }
  .video-thumb-placeholder { width: 80px; height: 45px; border-radius: 5px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .video-info { flex: 1; min-width: 0; }
  .video-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .video-meta { font-size: 10px; color: var(--text3); }
  .video-views { font-size: 10px; color: var(--green); font-weight: 600; }
  .no-videos { font-size: 12px; color: var(--text3); padding: 8px 0; }

  /* Recommendations */
  .rec-box { margin: 16px 20px 30px; background: var(--bg2); border: 1px solid rgba(124,111,247,0.3); border-radius: 16px; padding: 16px; }
  .rec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .rec-head-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .rec-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .rec-score-badge { padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; background: var(--green-bg); color: var(--green); }
  .rec-plat-badge { padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; background: var(--purple-bg); color: var(--purple); }
  .rec-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 4px 0 2px; }
  .rec-reason { font-size: 11px; color: var(--text2); }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; flex-direction: column; gap: 12px; }
  .loader { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text2); }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .stat-val { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="logo-text">Trend<span>IQ</span></div>
    <span class="badge badge-live">● LIVE</span>
  </div>
  <div class="sync-info">Last sync: <span class="sync-time" id="sync-time">--:--</span></div>
</div>

<div class="notif" id="notif-bar">
  <div style="font-size:16px;">🔔</div>
  <div>
    <div class="notif-title" id="notif-title">Data load ho raha hai...</div>
    <div class="notif-sub" id="notif-sub">Thoda wait karo</div>
  </div>
</div>

<div class="filters" id="time-filters">
  <button class="time-btn active" data-time="1day">1 Din</button>
  <button class="time-btn" data-time="1hr">1 Hr</button>
  <button class="time-btn" data-time="5hr">5 Hr</button>
  <button class="time-btn" data-time="10hr">10 Hr</button>
  <button class="time-btn" data-time="3day">3 Din</button>
  <button class="time-btn" data-time="1week">1 Hafte</button>
</div>

<div class="plat-filters">
  <button class="plat-btn yt-active" id="btn-yt" data-plat="youtube">▶ YouTube</button>
  <button class="plat-btn" id="btn-ig" data-plat="instagram">◉ Instagram Reels</button>
  <button class="plat-btn" id="btn-both" data-plat="both">⚡ Cross-Platform</button>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label">Topics</div><div class="stat-val" id="s1">—</div></div>
  <div class="stat-card"><div class="stat-label">Verified</div><div class="stat-val" id="s2">—</div></div>
  <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-val" id="s3">—</div></div>
  <div class="stat-card"><div class="stat-label">Top Category</div><div class="stat-val" id="s4">—</div></div>
</div>

<div class="cat-filters" id="cat-filters">
  <button class="cat-btn active" data-cat="all">Sab</button>
  <button class="cat-btn" data-cat="tech">Tech & AI</button>
  <button class="cat-btn" data-cat="politics">Politics</button>
  <button class="cat-btn" data-cat="finance">Finance</button>
  <button class="cat-btn" data-cat="business">Business</button>
  <button class="cat-btn" data-cat="startups">Startups</button>
  <button class="cat-btn" data-cat="incidents">Incidents & Geo</button>
</div>

<div class="section-head">Trending Topics</div>

<div id="main-content">
  <div class="loading"><div class="loader"></div><div class="loading-text">Trends load ho rahi hain...</div></div>
</div>

<div class="rec-box">
  <div class="rec-head">
    <span style="font-size:18px;">🤖</span>
    <span class="rec-head-text">AI Recommendation — Aaj Ye Video Banao</span>
  </div>
  <div id="rec-content"><div class="loading"><div class="loader"></div></div></div>
</div>

<script>
const SUPABASE_URL = 'https://xpyeeaafdopuutintoyi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhweWVlYWFmZG9wdXV0aW50b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTQzNDAsImV4cCI6MjA4OTEzMDM0MH0.NHCJJvAXXuUVbEjzS77GjZjqRlUO7eVUQOhtzcksrPM';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const CAT_CLASS = { tech:'chip-tech', finance:'chip-finance', politics:'chip-politics', incidents:'chip-incidents', business:'chip-business', startups:'chip-startups' };
const CAT_LABEL = { tech:'Tech & AI', finance:'Finance', politics:'Politics', incidents:'Incidents & Geo', business:'Business', startups:'Startups' };
const FACT_CLASS = { verified:'chip-verified', partial:'chip-partial', misleading:'chip-misleading' };
const FACT_ICON  = { verified:'✓ Verified', partial:'~ Partial', misleading:'✗ Misleading' };

let allTopics = [], allRecs = [], statsData = {}, rawVideos = {};
let currentPlat = 'youtube', currentCat = 'all';
let expandedId = null;

async function loadData() {
  try {
    const { data, error } = await db
      .from('trendiq_data')
      .select('*')
      .order('fetched_at', { ascending: false })
      .limit(1)
      .single();

    if (error || !data) {
      document.getElementById('main-content').innerHTML = '<div class="loading"><div class="loading-text">Data nahi mila. GitHub Actions se run karo.</div></div>';
      return;
    }

    allTopics  = data.topics || [];
    allRecs    = data.recommendations || [];
    statsData  = data.stats || {};
    rawVideos  = data.youtube_videos || {};

    const syncDate = new Date(data.fetched_at);
    document.getElementById('sync-time').textContent = syncDate.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });

    const top = allRecs[0];
    if (top) {
      document.getElementById('notif-title').textContent = 'Aaj ki AI Recommendation taiyaar hai!';
      document.getElementById('notif-sub').textContent = top.title + ' — Score ' + top.score;
    }

    document.getElementById('s1').textContent = statsData.total_topics || allTopics.length;
    document.getElementById('s2').textContent = statsData.verified_count || '—';
    document.getElementById('s3').textContent = statsData.total_views || '—';
    document.getElementById('s4').textContent = statsData.top_category || '—';

    renderTopics();
    renderRecs();
  } catch (err) {
    console.error(err);
  }
}

function getVideosForTopic(topicTitle) {
  for (const key of Object.keys(rawVideos)) {
    if (key.toLowerCase().includes(topicTitle.toLowerCase().split(' ')[0]) ||
        topicTitle.toLowerCase().includes(key.toLowerCase().split(' ')[0])) {
      return rawVideos[key] || [];
    }
  }
  return Object.values(rawVideos)[0] || [];
}

function renderVideos(topicTitle) {
  const videos = getVideosForTopic(topicTitle);
  if (!videos || videos.length === 0) {
    return '<div class="no-videos">Videos abhi load nahi hue — agli run mein aayenge</div>';
  }
  return videos.map(v => `
    <a class="video-card" href="${v.url}" target="_blank">
      ${v.thumbnail
        ? `<img class="video-thumb" src="${v.thumbnail}" alt="" loading="lazy">`
        : `<div class="video-thumb-placeholder">▶</div>`}
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">${v.channel} · ${v.published}</div>
        <div class="video-views">👁 ${v.views_display || 'N/A'} views</div>
      </div>
    </a>`).join('');
}

function renderTopics() {
  let topics = allTopics.slice();
  if (currentCat !== 'all') topics = topics.filter(t => t.category === currentCat);
  if (currentPlat === 'instagram') topics.sort((a,b) => (b.ig_score||0) - (a.ig_score||0));
  else topics.sort((a,b) => (b.yt_score||0) - (a.yt_score||0));

  const isYT = currentPlat === 'youtube' || currentPlat === 'both';
  const isIG = currentPlat === 'instagram' || currentPlat === 'both';

  const html = topics.map((t, i) => {
    const cat  = t.category || 'tech';
    const fact = t.fact_status || 'partial';
    const ytS  = t.yt_score || 0;
    const igS  = t.ig_score || 0;
    const ytColor = ytS >= 80 ? '#f87171' : ytS >= 60 ? '#fbbf24' : '#5a5a72';
    const igColor = igS >= 80 ? '#7c6ff7' : igS >= 60 ? '#4ade80' : '#5a5a72';
    const isExp = expandedId === i;
    const crossBadge = t.cross_platform ? '<span class="chip chip-cross">⚡ Both pe</span>' : '';
    const videos = renderVideos(t.title);

    return `<div class="topic-card ${isExp ? 'expanded' : ''}" onclick="toggleExpand(${i})">
      <div class="topic-top">
        <div class="rank ${i<3?'top3':''}">${String(i+1).padStart(2,'0')}</div>
        <div class="topic-body">
          <div class="topic-title">${t.title}</div>
          <div class="topic-badges">
            <span class="chip ${CAT_CLASS[cat]||'chip-tech'}">${CAT_LABEL[cat]||cat}</span>
            <span class="chip ${FACT_CLASS[fact]||'chip-partial'}">${FACT_ICON[fact]||fact}</span>
            ${crossBadge}
          </div>
          ${isYT && ytS ? `<div class="bar-row">
            <span class="bar-label">▶ YouTube</span>
            <div class="bar-track"><div class="bar-fill" style="width:${ytS}%;background:${ytColor};"></div></div>
            <span class="bar-score">${ytS}</span>
            <span class="bar-meta">${t.youtube_videos||''}</span>
          </div>` : ''}
          ${isIG && igS ? `<div class="bar-row">
            <span class="bar-label">◉ Reels</span>
            <div class="bar-track"><div class="bar-fill" style="width:${igS}%;background:${igColor};"></div></div>
            <span class="bar-score">${igS}</span>
            <span class="bar-meta">${t.ig_hashtag||''} · ${t.ig_reels||'N/A'} reels</span>
          </div>` : ''}
          <div class="topic-since">${t.since||''} trending · ${t.sources||'—'}</div>
        </div>
        <div class="expand-arrow ${isExp?'open':''}">▼</div>
      </div>
      <div class="videos-panel ${isExp?'open':''}">
        <div class="videos-label">▶ Top YouTube Videos</div>
        ${videos}
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = html ||
    '<div class="loading"><div class="loading-text">Is category mein koi topic nahi.</div></div>';
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderTopics();
}

function renderRecs() {
  const html = allRecs.map((r,i) => `
    <div class="rec-item">
      <div style="display:flex;gap:6px;margin-bottom:4px;">
        <span class="rec-score-badge">#${i+1} · Score ${r.score}</span>
        ${r.platform==='both'?'<span class="rec-plat-badge">⚡ Cross-Platform</span>':''}
      </div>
      <div class="rec-title">${r.title}</div>
      <div class="rec-reason">${r.reason}</div>
    </div>`).join('');
  document.getElementById('rec-content').innerHTML = html ||
    '<div class="rec-reason" style="color:var(--text3)">Data load nahi hua.</div>';
}

document.getElementById('time-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-time]');
  if (!btn) return;
  document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

document.querySelectorAll('[data-plat]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPlat = btn.dataset.plat;
    document.getElementById('btn-yt').className   = 'plat-btn';
    document.getElementById('btn-ig').className   = 'plat-btn';
    document.getElementById('btn-both').className = 'plat-btn';
    if (currentPlat==='youtube')   document.getElementById('btn-yt').className   = 'plat-btn yt-active';
    if (currentPlat==='instagram') document.getElementById('btn-ig').className   = 'plat-btn ig-active';
    if (currentPlat==='both')      document.getElementById('btn-both').className = 'plat-btn both-active';
    expandedId = null;
    renderTopics();
  });
});

document.getElementById('cat-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]');
  if (!btn) return;
  currentCat = btn.dataset.cat;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  expandedId = null;
  renderTopics();
});

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
